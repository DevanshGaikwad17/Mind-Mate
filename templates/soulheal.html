<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breathing Exercise</title>
  <link rel="stylesheet" href="static/soulheal.css">
</head>
<body>
        <button 
            onclick="location.href='/start'" 
            style="
                position: fixed; 
                top: 10px; 
                left: 10px; 
                background-color: rgb(48, 154, 186); 
                color: white; 
                padding: 10px 20px; 
                border: none; 
                border-radius: 5px; 
                font-size: 16px; 
                cursor: pointer; 
                z-index: 1000; 
                box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            ">
            Home
        </button>
  <section id="breathing-exercise">
    <!-- Overlay Content with Modern Styling -->
    <!-- Overlay Content with Modern Styling -->
    <div class="overlay">
      <h2>Mind, Body and Soul Healing</h2>
      <p class="instructions">Take a deep breath in... and out. Follow the video to relax.</p>
      
    </div>
  </section>
    <!-- Full-screen Video Background -->
    <div class="video-container">
      <video controls id="center-video">
        <source src="static/soulheal.mp4" type="video/mp4">
      </video>
    </div>

</body>
</html>
