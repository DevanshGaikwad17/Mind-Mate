<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        /* The switch - the box around the slider */
        .switch {
            font-size: 17px;
            position: fixed; /* Fixes the switch in the viewport */
            top: 10px; /* Adjust to give space from the top */
            right: 10px; /* Adjust to give space from the right */
            display: inline-block;
            width: 3.5em;
            height: 2em;
            z-index: 999; /* Ensures it's on top of other content */
        }

        /* Hide default HTML checkbox */
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* The slider */
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgb(182, 182, 182);
            transition: .4s;
            border-radius: 10px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 1.4em;
            width: 1.4em;
            border-radius: 8px;
            left: 0.3em;
            bottom: 0.3em;
            transform: rotate(270deg);
            background-color: rgb(255, 255, 255);
            transition: .4s;
        }

        .switch input:checked + .slider {
            background-color:#74c4b4;
        }

        .switch input:focus + .slider {
            box-shadow: 0 0 1px #2196F3;
        }

        .switch input:checked + .slider:before {
            transform: translateX(1.5em);
        }
    </style>
        <script>
            let isMusicPlaying = false;

            function toggleMusic() {
                const bgMusic = document.getElementById('bg-music');

                if (isMusicPlaying) {
                    bgMusic.pause();
                } else {
                    bgMusic.play();
                }

                isMusicPlaying = !isMusicPlaying;
            }
        </script>


        <script>
            function callPls() {
                fetch('/run-pls', {  // Make a POST request to the /run-pls route
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                })
                .then(response => response.json())
                .then(data => {
                    console.log(data.result);  // Display the response in the console
                })
                .catch(error => console.error('Error:', error));
            }
        </script>
