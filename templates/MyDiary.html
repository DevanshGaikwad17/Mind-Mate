<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Mindful Options</title>
    <link rel="stylesheet" href="static/MyDiary.css">
</head>
<body>
        <button 
            onclick="location.href='/start'" 
            style="
                position: fixed; 
                top: 10px; 
                left: 10px; 
                background-color: rgb(48, 154, 186); 
                color: white; 
                padding: 10px 20px; 
                border: none; 
                border-radius: 5px; 
                font-size: 16px; 
                cursor: pointer; 
                z-index: 1000; 
                box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            ">
            Home
        </button>
    <div class="button-container">
        <h1>Welcome to Your Mindful Journal</h1>
        <p>What would you like to do today:</p>
        <div class="button-grid">
            <div class="button" id="new-entry" onclick="window.location.href='/survey'">
                <img src="static/entry.png" alt="Create New Entry Icon">
                Create New Journal
            </div>
            <div class="button" id="revisit-memories" onclick="window.location.href='/memories'">
                <img src="static/memories.png" alt="Revisit Memories Icon">
                Revisit Old Memories
            </div>
        </div>
    </div>
</body>
</html>
